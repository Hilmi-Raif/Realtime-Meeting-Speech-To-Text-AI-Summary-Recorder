name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      asset_name: ${{ steps.metadata.outputs.asset_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          if [[ -z "${VERSION}" ]]; then
            echo "version not found in Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            EXPECTED_TAG="v${VERSION}"
            if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
              echo "tag ${TAG} does not match Cargo.toml version ${EXPECTED_TAG}" >&2
              exit 1
            fi
            GENERATE_NOTES="true"
          else
            TAG="v${VERSION}"
            BODY="Manual Windows release build for ${TAG}."
            GENERATE_NOTES="false"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "asset_name=RMS-AI-Recorder-${VERSION}-setup.exe" >> "$GITHUB_OUTPUT"
          echo "generate_notes=${GENERATE_NOTES}" >> "$GITHUB_OUTPUT"
          if [[ -n "${BODY:-}" ]]; then
            echo "body=${BODY}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or find release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_BODY: ${{ steps.metadata.outputs.body }}
          GENERATE_RELEASE_NOTES: ${{ steps.metadata.outputs.generate_notes }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const body = process.env.RELEASE_BODY;
            const generateReleaseNotes = process.env.GENERATE_RELEASE_NOTES === 'true';

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.setOutput('release_id', release.data.id);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              body,
              generate_release_notes: generateReleaseNotes,
              draft: false,
              prerelease: false,
            });
            core.setOutput('release_id', release.data.id);

  build-windows:
    needs: prepare-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        shell: pwsh
        run: cargo install cargo-packager --locked

      - name: Package NSIS installer
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }
          $packagerToml = Get-Content Packager.toml -Raw
          $packagerToml = $packagerToml -replace '(?m)^version = "[^"]+"', 'version = "${{ needs.prepare-release.outputs.version }}"'
          Set-Content Packager.toml $packagerToml -NoNewline
          cargo packager --release --formats nsis

      - name: Prepare release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $installer = Get-ChildItem . -Filter *-setup.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer not found"
          }
          Move-Item $installer.FullName "dist/${{ needs.prepare-release.outputs.asset_name }}" -Force

      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.prepare-release.outputs.tag }}" "dist/${{ needs.prepare-release.outputs.asset_name }}" --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare-release.outputs.asset_name }}
          path: dist/${{ needs.prepare-release.outputs.asset_name }}
